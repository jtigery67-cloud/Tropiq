<!DOCTYPE html>
<html>
<head>
    <title>Edit Post</title>
</head>
<body>

<h2>Edit Post</h2>

<form method="POST">

    <textarea name="content" rows="5" cols="40">{{ post.content }}</textarea>

    <br><br>

    <button type="submit">Save</button>

</form>

<br>

<a href="/profile/{{ post.username }}">Cancel</a>

</body>
</html>
